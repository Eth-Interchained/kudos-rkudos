kind = "web"
previewPath = "/"
title = "Social Mining Platform"
version = "1.0.0"
id = "artifacts/social-mining"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19069

[services.development]
run = "pnpm --filter @workspace/social-mining run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/social-mining", "run", "build" ]
publicDir = "artifacts/social-mining/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19069"
BASE_PATH = "/"
